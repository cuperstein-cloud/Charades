<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Charades!</title>
  <style>
    :root {
      --bg: #7f0000;
      --card: #1e293b;
      --blue: #3b82f6;
      --blue-light: #93c5fd;
      --red: #ef4444;
      --red-light: #fca5a5;
      --text: #f8fafc;
      --muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
    height: 100dvh;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    .screen {
      display: none;
      position: fixed;
      inset: 0;
      flex-direction: column;
      align-items: center;
    }
    .screen.active { display: flex; }

    /* ── HOME ── */
    #screen-home {
      background: linear-gradient(160deg, #7f0000 0%, #b91c1c 100%);
    }
    .home-header {
      width: 100%;
      padding: 56px 24px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .home-title {
      font-size: 44px;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .home-subtitle { font-size: 15px; color: var(--muted); margin-top: 6px; }
    .btn-admin {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: white;
      padding: 10px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: 12px;
      margin-top: 4px;
    }
    .categories-list {
      width: 100%;
      padding: 12px 20px 48px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      align-content: start;
    }
    .empty-state-wrap { grid-column: 1 / -1; }
    .category-card {
      position: relative;
      border-radius: 20px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.12s, border-color 0.12s;
      overflow: hidden;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 20px 12px;
    }
    .category-card:active { transform: scale(0.95); border-color: rgba(255,255,255,0.5); }
    .category-card .cat-emoji { font-size: 44px; line-height: 1; flex-shrink: 0; }
    .category-card .name { font-size: 20px; font-weight: 800; text-align: center; line-height: 1.25; }
    .category-card .count { font-size: 14px; color: rgba(255,255,255,0.65); flex-shrink: 0; }
    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 64px; margin-bottom: 16px; }
    .empty-state p { font-size: 17px; line-height: 1.5; margin-bottom: 24px; }
    .btn-go-admin {
      background: var(--blue);
      border: none;
      color: white;
      padding: 14px 28px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ── ADMIN ── */
    #screen-admin { background: var(--bg); }
    .admin-header {
      width: 100%;
      padding: 56px 24px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }
    .admin-title { font-size: 28px; font-weight: 800; }
    .btn-back {
      background: rgba(255,255,255,0.08);
      border: none;
      color: white;
      padding: 10px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .admin-content {
      width: 100%;
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 24px 100px;
    }
    .admin-add-btn {
      width: 100%;
      background: var(--blue);
      border: none;
      color: white;
      padding: 16px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 20px;
    }
    .admin-cat {
      background: var(--card);
      border-radius: 20px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .admin-cat-header {
      display: flex;
      align-items: center;
      padding: 16px 18px;
      gap: 10px;
      cursor: pointer;
    }
    .admin-cat-name { flex: 1; font-size: 17px; font-weight: 700; }
    .admin-cat-count { font-size: 12px; color: var(--muted); }
    .admin-cat-chevron {
      font-size: 18px;
      opacity: 0.4;
      transition: transform 0.2s;
    }
    .admin-cat.open .admin-cat-chevron { transform: rotate(180deg); }
    .admin-cat-body { display: none; padding: 0 18px 16px; }
    .admin-cat.open .admin-cat-body { display: block; }
    .admin-word-row {
      display: flex;
      align-items: center;
      padding: 10px 0;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .admin-word-text { flex: 1; font-size: 15px; }
    .btn-del-word {
      background: rgba(239,68,68,0.15);
      border: none;
      color: var(--red);
      width: 34px;
      height: 34px;
      border-radius: 8px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .admin-body-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .btn-add-word {
      flex: 1;
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.25);
      color: var(--blue-light);
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-rename-cat {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--muted);
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
    }
    .btn-del-cat {
      background: rgba(239,68,68,0.15);
      border: 1px solid rgba(239,68,68,0.25);
      color: var(--red);
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      cursor: pointer;
    }
    .admin-edit-icon {
      background: none;
      border: none;
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
      opacity: 0.5;
    }

    /* ── SETTINGS CARD ── */
    .settings-card {
      background: var(--card);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .settings-card-title {
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .stepper-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
    }
    .stepper-row + .stepper-row {
      border-top: 1px solid rgba(255,255,255,0.06);
    }
    .stepper-name { font-size: 16px; font-weight: 700; }
    .stepper-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .stepper-ctrl {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }
    .btn-step {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 10px;
      color: white;
      font-size: 22px;
      font-weight: 300;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .btn-step:active { background: rgba(255,255,255,0.2); }
    .btn-step:disabled { opacity: 0.25; cursor: default; }
    .stepper-val {
      font-size: 18px;
      font-weight: 800;
      min-width: 68px;
      text-align: center;
      color: var(--blue-light);
      font-variant-numeric: tabular-nums;
    }

    /* ── READY ── */
    #screen-ready {
      background: linear-gradient(160deg, #7f0000, #b91c1c);
      padding: 40px 28px;
      text-align: center;
      justify-content: center;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .ready-emoji { font-size: 72px; margin-bottom: 20px; }
    .ready-title { font-size: 34px; font-weight: 900; margin-bottom: 8px; }
    .ready-cat { font-size: 20px; color: var(--blue-light); font-weight: 700; margin-bottom: 32px; }
    .tilt-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 32px;
      text-align: left;
    }
    .tilt-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 10px 0;
    }
    .tilt-row + .tilt-row { border-top: 1px solid rgba(255,255,255,0.08); }
    .tilt-icon { font-size: 32px; width: 44px; text-align: center; }
    .tilt-action { font-size: 15px; font-weight: 700; }
    .tilt-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .btn-start {
      width: 100%;
      padding: 20px;
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      border: none;
      border-radius: 20px;
      color: white;
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
      letter-spacing: 1px;
    }
    .btn-back-ready {
      margin-top: 14px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 15px;
      cursor: pointer;
      padding: 10px;
    }

    /* ── COUNTDOWN ── */
    #screen-countdown {
      background: linear-gradient(160deg, #7f0000, #b91c1c);
      justify-content: center;
      align-items: center;
      gap: 24px;
    }
    .countdown-label {
      font-size: 32px;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.85);
    }
    @keyframes countPop {
      0%   { transform: scale(1.4); opacity: 0.4; }
      100% { transform: scale(1);   opacity: 1; }
    }
    .countdown-number {
      font-size: 160px;
      font-weight: 900;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(135deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: countPop 0.4s ease-out forwards;
    }
    .countdown-cat {
      font-size: 20px;
      color: rgba(255,255,255,0.55);
      font-weight: 600;
    }

    /* ── GAME ── */
    #screen-game {
      background: #7f0000;
      overflow: hidden;
    }
    .game-flash {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.08s;
      z-index: 10;
    }
    .game-flash.on { opacity: 0.25; }
    .game-flash.blue { background: #3b82f6; }
    .game-flash.red { background: #ef4444; }
    .game-feedback-text {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      font-weight: 900;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.08s;
      z-index: 11;
    }
    .game-feedback-text.on { opacity: 1; }
    .game-feedback-text.blue { color: var(--blue-light); }
    .game-feedback-text.red { color: var(--red-light); }
    .game-top {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 52px 28px 12px;
      flex-shrink: 0;
    }
    .game-timer-val {
      font-size: 38px;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      letter-spacing: -1px;
      line-height: 1;
    }
    .game-timer-val.urgent { color: var(--red); }
    .game-timer-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; }
    .game-score-val {
      font-size: 38px;
      font-weight: 900;
      color: var(--blue);
      line-height: 1;
    }
    .game-score-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 3px; text-align: right; }
    .btn-game-back {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.7);
      width: 40px;
      height: 40px;
      border-radius: 12px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .word-bar-wrap { width: 100%; padding: 0 24px; flex-shrink: 0; }
    .word-bar-bg {
      height: 7px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      overflow: hidden;
    }
    .word-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: var(--blue);
      transition: width 0.25s linear, background 0.4s;
    }
    .word-bar-fill.warn { background: #f59e0b; }
    .word-bar-fill.danger { background: var(--red); }
    .game-center {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 16px 28px;
      width: 100%;
    }
    .game-word {
      font-size: 52px;
      font-weight: 900;
      text-align: center;
      line-height: 1.1;
      letter-spacing: -1px;
      width: 100%;
    }
    .game-word-num {
      font-size: 88px;
      font-weight: 900;
      color: rgba(255,255,255,0.07);
      margin-top: 10px;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    /* ── RESULTS ── */
    #screen-results {
      background: linear-gradient(160deg, #7f0000, #b91c1c);
    }
    .results-header {
      width: 100%;
      padding: 56px 24px 24px;
      text-align: center;
      flex-shrink: 0;
    }
    .results-title { font-size: 36px; font-weight: 900; }
    .results-score { font-size: 22px; color: var(--blue-light); font-weight: 700; margin-top: 8px; }
    .results-scroll {
      width: 100%;
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 24px 120px;
    }
    .results-section { margin-bottom: 28px; }
    .results-section-label {
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 12px;
      padding-left: 4px;
    }
    .results-section-label.blue { color: var(--blue-light); }
    .results-section-label.red { color: var(--red-light); }
    .results-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      padding: 8px 16px;
      border-radius: 24px;
      font-size: 15px;
      font-weight: 600;
    }
    .chip.blue {
      background: rgba(59,130,246,0.18);
      color: var(--blue-light);
      border: 1px solid rgba(59,130,246,0.3);
    }
    .chip.red {
      background: rgba(239,68,68,0.18);
      color: var(--red-light);
      border: 1px solid rgba(239,68,68,0.3);
    }
    .results-footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 16px 24px 40px;
      background: linear-gradient(transparent, #0a0e1a 50%);
    }
    .btn-next-round {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #3b82f6, #7c3aed);
      border: none;
      border-radius: 20px;
      color: white;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 999;
      backdrop-filter: blur(4px);
    }
    .modal {
      background: #1e293b;
      border-radius: 24px;
      padding: 28px;
      width: 100%;
      max-width: 400px;
    }
    .modal-title { font-size: 21px; font-weight: 800; margin-bottom: 18px; }
    .modal-body { color: var(--muted); font-size: 15px; line-height: 1.5; margin-bottom: 22px; }
    .modal-label { font-size: 13px; color: var(--muted); margin-bottom: 6px; }
    .modal-input {
      width: 100%;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px;
      padding: 14px 16px;
      color: white;
      font-size: 16px;
      outline: none;
      margin-bottom: 18px;
    }
    .modal-input:focus { border-color: var(--blue); }
    .modal-input::placeholder { color: #4b5563; }
    .modal-btns { display: flex; gap: 10px; }
    .btn-mcancel {
      flex: 1;
      padding: 14px;
      background: rgba(255,255,255,0.08);
      border: none;
      border-radius: 14px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-mconfirm {
      flex: 1;
      padding: 14px;
      background: var(--blue);
      border: none;
      border-radius: 14px;
      color: white;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-mconfirm.danger { background: var(--red); }

    /* ── LANDSCAPE ADJUSTMENTS ── */
    @media (orientation: landscape) and (max-height: 500px) {
      .home-header { padding: 12px 16px 6px; }
      .home-title { font-size: 22px; }
      .home-subtitle { font-size: 11px; }
      .categories-list { padding: 6px 14px 16px; gap: 8px; grid-template-columns: 1fr 1fr 1fr 1fr; }
      .category-card { aspect-ratio: unset; height: auto; padding: 14px 10px; border-radius: 14px; gap: 6px; min-height: unset; }
      .category-card .cat-emoji { font-size: 30px; }
      .category-card .name { font-size: 16px; }
      .category-card .count { font-size: 12px; }

      .admin-header { padding: 16px 20px 8px; }
      .admin-title { font-size: 20px; }
      .admin-content { padding: 0 20px 60px; }

      #screen-ready { padding: 16px 24px; overflow-y: auto; justify-content: flex-start; }
      .ready-emoji { font-size: 36px; margin-bottom: 8px; }
      .ready-title { font-size: 22px; }
      .ready-cat { font-size: 15px; margin-bottom: 12px; }
      #ready-timers { margin-top: -8px !important; margin-bottom: 12px !important; }
      .tilt-box { padding: 12px 16px; margin-bottom: 14px; }
      .tilt-row { padding: 6px 0; }
      .tilt-icon { font-size: 22px; }
      .tilt-action { font-size: 13px; }
      .btn-start { padding: 14px; font-size: 18px; }
      .btn-back-ready { margin-top: 6px; font-size: 13px; padding: 6px; }

      .game-top { padding: 12px 20px 6px; }
      .game-timer-val { font-size: 26px; }
      .game-score-val { font-size: 26px; }
      .game-timer-label, .game-score-label { font-size: 9px; }
      .word-bar-wrap { padding: 0 16px; }
      .word-bar-bg { height: 5px; }
      .game-center { padding: 6px 20px; }
      .game-word { font-size: 64px !important; }
      .game-word-num { font-size: 52px; margin-top: 4px; }
      .btn-game-back { width: 34px; height: 34px; font-size: 16px; }

      .results-header { padding: 20px 20px 12px; }
      .results-title { font-size: 26px; }
    }
    /* ── SPLASH ── */
    #screen-splash {
      background: #000;
      overflow: hidden;
      justify-content: flex-end;
      align-items: center;
      cursor: pointer;
    }
    #splash-canvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }
    .splash-photo-wrap {
      position: absolute;
      inset: 0;
      z-index: 1;
    }
    #splash-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
      opacity: 0;
      transition: opacity 0.9s ease;
    }
    .splash-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.05) 40%, rgba(0,0,0,0.75) 100%);
      z-index: 2;
    }
    .splash-text-wrap {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 32px 24px 64px;
      transform: translateY(50px);
      opacity: 0;
      transition: transform 0.8s cubic-bezier(0.34,1.56,0.64,1), opacity 0.8s ease;
    }
    .splash-text-wrap.visible {
      transform: translateY(0);
      opacity: 1;
    }
    .splash-msg {
      font-size: clamp(30px, 8vw, 58px);
      font-weight: 900;
      line-height: 1.25;
      letter-spacing: -0.5px;
      text-shadow: 0 2px 20px rgba(0,0,0,0.9), 0 0 60px rgba(0,0,0,0.7);
      background: linear-gradient(90deg,

      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      animation: rainbowShift 2.5s linear infinite;

<script>
// ════════════════════════════════════════
// DATA — saved to localStorage + bundled defaults
// ════════════════════════════════════════
const DEFAULTS = [
  {
    id: 'cat-movies', name: "🎬 Movies",
    words: ["The Lion King","Avatar","Titanic","Star Wars","Jurassic Park",

    id: 'cat-actions', name: "🎭 Actions & Emotions",

];

const CARD_GRADIENTS = [
  ['#3b82f6','#6366f1'],
  ['#8b5cf6','#ec4899'],
  ['#f59e0b','#ef4444'],
  ['#10b981','#3b82f6'],
  ['#ef4444','#f97316'],
  ['#6366f1','#8b5cf6'],
  ['#ec4899','#f59e0b'],
  ['#0ea5e9','#10b981'],
];

let categories = [];

// settings: gameSecs (30s–10min), wordSecs (5–30s)
let settings = { gameSecs: 60, wordSecs: 10 };

const WORD_SECS_OPTIONS = [5, 10, 15, 20, 25, 30];
const GAME_SECS_OPTIONS = [30, 60, 120, 180, 240, 300, 360, 420, 480, 540, 600];

function fmtDuration(secs) {
  if (secs < 60) return secs + ' sec';
  return (secs / 60) + ' min';
}

function loadData() {
  try {
    const raw = localStorage.getItem('charades-v3');
    if (raw) categories = JSON.parse(raw);
  } catch(e) {}
  if (!categories || categories.length === 0) {
    categories = DEFAULTS.map(d => ({ ...d, words: [...d.words] }));
    saveData();
  }
  try {
    const rs = localStorage.getItem('charades-settings');
    if (rs) settings = { ...settings, ...JSON.parse(rs) };
  } catch(e) {}
}

function saveData() {
  try { localStorage.setItem('charades-v3', JSON.stringify(categories)); } catch(e) {}
}

function saveSettings() {
  try { localStorage.setItem('charades-settings', JSON.stringify(settings)); } catch(e) {}
}

function uid() {
  return 'c' + Math.random().toString(36).slice(2) + Date.now().toString(36);
}

// ════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════
function nav(screen) {
  // Stop game if navigating away
  if (screen !== 'game' && gameState.active) stopGame(false);

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screen).classList.add('active');

  if (screen === 'home') renderHome();
  if (screen === 'admin') renderAdmin();
}

// ════════════════════════════════════════
// HOME
// ════════════════════════════════════════
function renderHome() {
  const el = document.getElementById('home-list');
  if (categories.length === 0) {
    el.innerHTML = `
      <div class="empty-state-wrap">
        <div class="empty-state">
          <div class="icon">🎭</div>
          <p>No categories yet.<br>Head to Admin to add some!</p>
          <button class="btn-go-admin" onclick="nav('admin')">⚙ Go to Admin</button>
        </div>
      </div>`;
    return;
  }
  el.innerHTML = categories.map((cat, i) => {
    const [c1, c2] = CARD_GRADIENTS[i % CARD_GRADIENTS.length];
    const n = cat.words.length;
    // Extract leading emoji (if any) from name for the tile icon
    const emojiMatch = cat.name.match(/^(\p{Emoji_Presentation}|\p{Emoji}\uFE0F)\s*/u);
    const emoji = emojiMatch ? emojiMatch[0].trim() : '🎭';
    const label = emojiMatch ? cat.name.slice(emojiMatch[0].length) : cat.name;
    return `
      <div class="category-card" onclick="selectCategory('${cat.id}')"
           style="background:linear-gradient(145deg,${c1},${c2})">
        <div class="cat-emoji">${emoji}</div>
        <div class="name">${esc(label)}</div>
        <div class="count">${n} word${n !== 1 ? 's' : ''}</div>
      </div>`;
  }).join('');
}

let currentCatId = null;

function selectCategory(id) {
  const cat = categories.find(c => c.id === id);
  if (!cat) return;
  if (cat.words.length === 0) {
    alert('This category has no words. Add some in Admin first!');
    return;
  }
  currentCatId = id;
  document.getElementById('ready-cat-name').textContent = cat.name;
  document.getElementById('ready-timers').textContent =
    `${settings.wordSecs}s per word  •  ${fmtDuration(settings.gameSecs)} round`;
  nav('ready');
}

// ════════════════════════════════════════
// ADMIN — SETTINGS
// ════════════════════════════════════════
function renderAdminSettings() {
  const gameIdx = GAME_SECS_OPTIONS.indexOf(settings.gameSecs);
  const wordIdx = WORD_SECS_OPTIONS.indexOf(settings.wordSecs);
  const canDecGame = gameIdx > 0;
  const canIncGame = gameIdx < GAME_SECS_OPTIONS.length - 1;
  const canDecWord = wordIdx > 0;
  const canIncWord = wordIdx < WORD_SECS_OPTIONS.length - 1;

  document.getElementById('admin-settings').innerHTML = `
    <div class="settings-card">
      <div class="settings-card-title">⏱ Timer Settings</div>
      <div class="stepper-row">
        <div>
          <div class="stepper-name">Round Duration</div>
          <div class="stepper-sub">How long each round lasts</div>
        </div>
        <div class="stepper-ctrl">
          <button class="btn-step" onclick="changeGameSecs(-1)" ${canDecGame ? '' : 'disabled'}>−</button>
          <div class="stepper-val" id="sv-game">${fmtDuration(settings.gameSecs)}</div>
          <button class="btn-step" onclick="changeGameSecs(1)" ${canIncGame ? '' : 'disabled'}>+</button>
        </div>
      </div>
      <div class="stepper-row">
        <div>
          <div class="stepper-name">Time Per Word</div>
          <div class="stepper-sub">Seconds shown before auto-skip</div>
        </div>
        <div class="stepper-ctrl">
          <button class="btn-step" onclick="changeWordSecs(-1)" ${canDecWord ? '' : 'disabled'}>−</button>
          <div class="stepper-val" id="sv-word">${settings.wordSecs} sec</div>
          <button class="btn-step" onclick="changeWordSecs(1)" ${canIncWord ? '' : 'disabled'}>+</button>
        </div>
      </div>
    </div>
  `;
}

function changeGameSecs(delta) {
  const idx = GAME_SECS_OPTIONS.indexOf(settings.gameSecs);
  const newIdx = Math.min(GAME_SECS_OPTIONS.length - 1, Math.max(0, idx + delta));
  settings.gameSecs = GAME_SECS_OPTIONS[newIdx];
  saveSettings();
  renderAdminSettings();
}

function changeWordSecs(delta) {
  const idx = WORD_SECS_OPTIONS.indexOf(settings.wordSecs);
  const newIdx = Math.min(WORD_SECS_OPTIONS.length - 1, Math.max(0, idx + delta));
  settings.wordSecs = WORD_SECS_OPTIONS[newIdx];
  saveSettings();
  renderAdminSettings();
}

// ════════════════════════════════════════
// ADMIN
// ════════════════════════════════════════
function renderAdmin() {
  renderAdminSettings();
  const el = document.getElementById('admin-list');
  if (categories.length === 0) {
    el.innerHTML = '<p style="color:#4b5563;text-align:center;padding:20px 0;">No categories yet.</p>';

    <div class="admin-cat" id="acat-${cat.id}">
      <div class="admin-cat-header" onclick="toggleCat('${cat.id}')">

function toggleCat(id) {

function modalAddCategory() {
  showModal(`
    <div class="modal-title">New Category</div>
    <div class="modal-label">Category Name</div>
    <input class="modal-input" id="mi" placeholder='e.g. "Dina's Fun Time"' autofocus>

function confirmAddCategory() {
  const name = document.getElementById('mi')?.value?.trim();
  if (!name) return;
  categories.push({ id: uid(), name, words: [] });

  renderAdmin();

function modalRenameCategory(id) {
  const cat = categories.find(c => c.id === id);
  if (!cat) return;
  showModal(`
    <div class="modal-title">Rename Category</div>
    <div class="modal-label">New Name</div>
    <input class="modal-input" id="mi" value="${esc(cat.name)}" autofocus>
    <div class="modal-btns">
      <button class="btn-mcancel" onclick="closeModal()">Cancel</button>
      <button class="btn-mconfirm" onclick="confirmRenameCategory('${id}')">Save</button>
    </div>
  `);
  focusInput();
}

function confirmRenameCategory(id) {
  const name = document.getElementById('mi')?.value?.trim();
  if (!name) return;
  const cat = categories.find(c => c.id === id);
  if (cat) { cat.name = name; saveData(); }
  closeModal();
  renderAdmin();
}

function modalDeleteCategory(id) {
  const cat = categories.find(c => c.id === id);
  showModal(`
    <div class="modal-title">Delete "${esc(cat?.name || '')}"?</div>
    <div class="modal-body">This will permanently remove this category and all its words.</div>
    <div class="modal-btns">
      <button class="btn-mcancel" onclick="closeModal()">Cancel</button>
      <button class="btn-mconfirm danger" onclick="confirmDeleteCategory('${id}')">Delete</button>
    </div>
  `);
}

function confirmDeleteCategory(id) {
  categories = categories.filter(c => c.id !== id);
  saveData();
  closeModal();
  renderAdmin();
}

function modalAddWord(catId) {
  showModal(`
    <div class="modal-title">Add Word / Phrase</div>
    <div class="modal-label">Word or Phrase</div>
    <input class="modal-input" id="mi" placeholder='e.g. "The Lion King"' autofocus>
    <div class="modal-btns">
      <button class="btn-mcancel" onclick="closeModal()">Cancel</button>
      <button class="btn-mconfirm" onclick="confirmAddWord('${catId}')">Add</button>
    </div>
  `);
  focusInput();
}

function confirmAddWord(catId) {
  const word = document.getElementById('mi')?.value?.trim();
  if (!word) return;
  const cat = categories.find(c => c.id === catId);
  if (cat) { cat.words.push(word); saveData(); }
  closeModal();
  renderAdmin();
  setTimeout(() => {
    const el = document.getElementById('acat-' + catId);
    if (el) el.classList.add('open');
  }, 40);
}

function deleteWord(catId, idx) {
  const cat = categories.find(c => c.id === catId);
  if (cat) { cat.words.splice(idx, 1); saveData(); }
  renderAdmin();
  setTimeout(() => {
    const el = document.getElementById('acat-' + catId);
    if (el) el.classList.add('open');
  }, 40);
}

// ════════════════════════════════════════
// GAME ENGINE
// ════════════════════════════════════════
// ── TILT ENGINE ──────────────────────────────────────────────────────
//
// The game is played strictly in landscape, phone pressed against forehead,
// screen facing the audience.
//
// ─────────────────────────────────────────────────────────────────────
// TILT DETECTION — uses devicemotion accelerationIncludingGravity.y
//
// SIGNAL  : accelerationIncludingGravity.y  (m/s², ≈ –9.8 to +9.8)
//   face-up flat           → y ≈  0
//   portrait-top → floor   → y negative  → Correct (same sign both landscape orientations)
//   portrait-top → ceiling → y positive  → Skip
//
// iOS SIGN: iOS Safari inverts the gravity vector vs the W3C spec.
//   We auto-detect on first event by checking the sign of z (face-up → z near ±9.8):
//   spec/Android: z ≈ -9.8  →  motionSign = +1  (keep y as-is)
//   iOS:          z ≈ +9.8  →  motionSign = -1  (negate y)
//
// SETTLE THRESHOLD: set generously (1.5 m/s² over 5 readings) because
//   normal hand tremor easily produces spreads of 1–3 m/s². A threshold
//   that is too tight means tiltArmed never becomes true.
// ─────────────────────────────────────────────────────────────────────
const TILT_CORRECT_G  = 2.5;  // m/s² below baseline → Correct (~15° tilt)
const TILT_SKIP_G     = 1.2;  // m/s² above baseline → Skip  (~7° tilt)
const TILT_SMOOTH_N   = 5;    // moving-average window
const TILT_STREAK     = 4;    // consecutive readings past threshold to fire
const TILT_COOLDOWN   = 1500; // ms lockout after any action
const TILT_ARM_DELAY  = 1500; // ms before detection first activates
const TILT_SETTLE_N   = 5;    // readings required to declare phone "stable"
const TILT_SETTLE_G   = 1.5;  // max spread (m/s²) across those readings

let tiltBaseline    = null;
let tiltRawBuf      = [];
let tiltStreakDir   = 0;
let tiltStreakCnt   = 0;
let tiltArmed       = false;
let tiltInCooldown  = false;
let tiltCooldownEnd = 0;
let tiltStartTime   = 0;
let motionSign      = null;   // +1 or -1, detected from first z reading

// Full reset — call once at game start
function initTiltForGame() {
  tiltBaseline    = null;
  tiltRawBuf      = [];
  tiltStreakDir   = 0;
  tiltStreakCnt   = 0;
  tiltArmed       = false;
  tiltInCooldown  = false;
  tiltCooldownEnd = 0;
  tiltStartTime   = Date.now();
  motionSign      = null;
}

// Called after each action — starts cooldown and flushes buffer for fresh re-arm
function onTiltAction() {
  tiltStreakDir   = 0;
  tiltStreakCnt   = 0;
  tiltInCooldown  = true;
  tiltCooldownEnd = Date.now() + TILT_COOLDOWN;
  tiltRawBuf      = [];
}

// Called on each new word — clears streak only, baseline stays
function resetTiltState() {
  tiltStreakDir = 0;
  tiltStreakCnt = 0;
}

// If the last TILT_SETTLE_N readings span ≤ TILT_SETTLE_G m/s², records their
// average as tiltBaseline and returns true.
function getStableBaseline() {
  if (tiltRawBuf.length < TILT_SETTLE_N) return false;
  const recent = tiltRawBuf.slice(-TILT_SETTLE_N);
  const spread = Math.max(...recent) - Math.min(...recent);
  if (spread > TILT_SETTLE_G) return false;
  tiltBaseline = recent.reduce((a, b) => a + b, 0) / TILT_SETTLE_N;
  return true;
}

const gameState = {
  active: false,
  words: [],
  idx: 0,
  correct: [],
  missed: [],
  gameSecs: 0,
  wordSecs: 0,
  gameTimer: null,
  wordTimer: null,
  locked: false,
  betaBase: null,
  orientationBound: false,
};

let wakeLock = null;

startGame.countdownGen = 0;
function startGame() {
  const cat = categories.find(c => c.id === currentCatId);
  if (!cat || cat.words.length === 0) return;

  // Shuffle
  gameState.words = [...cat.words].sort(() => Math.random() - 0.5);
  gameState.idx = 0;
  gameState.correct = [];
  gameState.missed = [];
  gameState.gameSecs = settings.gameSecs;
  gameState.wordSecs = settings.wordSecs;
  gameState.locked = false;
  gameState.active = false; // not active until countdown ends

  requestOrientationPermission();
  acquireWakeLock();

  // Show countdown screen
  let numEl = document.getElementById('countdown-num');
  const catEl = document.getElementById('countdown-cat');
  catEl.textContent = cat.name;
  nav('countdown');

  let count = 5;
  const countdownId = ++startGame.countdownGen;

  const animateTick = (n) => {
    // Restart CSS animation by replacing the element
    const parent = numEl.parentNode;
    const clone = numEl.cloneNode(true);
    clone.textContent = n;
    parent.replaceChild(clone, numEl);
    numEl = clone;
  };

  animateTick(count);

  const tick = () => {
    if (countdownId !== startGame.countdownGen) return; // stale countdown
    count--;
    if (count > 0) {
      animateTick(count);
      setTimeout(tick, 1000);
    } else {
      // Launch game
      gameState.active = true;
      initTiltForGame();
      nav('game');
      displayWord();
      runGameTimer();
      runWordTimer();
    }
  };

  setTimeout(tick, 1000);
}

function stopGame(showResults) {
  gameState.active = false;
  clearInterval(gameState.gameTimer);
  clearInterval(gameState.wordTimer);
  if (gameState.orientationBound) {
    window.removeEventListener('devicemotion', onMotion);
    gameState.orientationBound = false;
  }
  releaseWakeLock();
  if (showResults) showResultsScreen();
}

function displayWord() {
  const w = gameState.words[gameState.idx % gameState.words.length];
  const el = document.getElementById('g-word');
  el.textContent = w;
  // Adaptive font size
  const len = w.length;
  el.style.fontSize = len > 30 ? '38px' : len > 20 ? '48px' : len > 12 ? '60px' : '72px';
  resetTiltState();
  updateWordBar();
  document.getElementById('g-wnum').textContent = settings.wordSecs;
}

function runGameTimer() {
  clearInterval(gameState.gameTimer);
  gameState.gameTimer = setInterval(() => {
    if (!gameState.active) return;
    gameState.gameSecs--;
    updateGameTimerUI();
    if (gameState.gameSecs <= 0) stopGame(true);
  }, 1000);
}

function runWordTimer() {
  clearInterval(gameState.wordTimer);
  gameState.wordSecs = settings.wordSecs;
  gameState.wordTimer = setInterval(() => {
    if (!gameState.active) return;
    gameState.wordSecs--;
    updateWordBar();
    if (gameState.wordSecs <= 0) doPass();
  }, 1000);
}

function updateGameTimerUI() {
  const m = Math.floor(gameState.gameSecs / 60);
  const s = gameState.gameSecs % 60;
  const el = document.getElementById('g-time');
  el.textContent = `${m}:${String(s).padStart(2,'0')}`;
  el.className = 'game-timer-val' + (gameState.gameSecs <= 30 ? ' urgent' : '');
}

function updateWordBar() {
  const total = settings.wordSecs;
  const pct = Math.max(0, (gameState.wordSecs / total) * 100);
  const dangerAt = Math.max(1, Math.floor(total * 0.2));
  const warnAt   = Math.max(2, Math.floor(total * 0.4));
  const bar = document.getElementById('word-bar');
  const num = document.getElementById('g-wnum');
  if (bar) {
    bar.style.width = pct + '%';
    bar.className = 'word-bar-fill' +
      (gameState.wordSecs <= dangerAt ? ' danger' : gameState.wordSecs <= warnAt ? ' warn' : '');
  }
  if (num) num.textContent = Math.max(0, gameState.wordSecs);
}

function doCorrect() {
  if (!gameState.active || gameState.locked) return;
  gameState.locked = true;
  gameState.correct.push(gameState.words[gameState.idx % gameState.words.length]);
  document.getElementById('g-score').textContent = gameState.correct.length;
  flash('blue', '✓ Got it!');
  advance();
}

function doPass() {
  if (!gameState.active || gameState.locked) return;
  gameState.locked = true;
  gameState.missed.push(gameState.words[gameState.idx % gameState.words.length]);
  flash('red', '✗ Skip');
  advance();
}

function advance() {
  clearInterval(gameState.wordTimer);
  gameState.idx++;
  onTiltAction(); // enter recovery mode — phone must return to center before re-arming
  setTimeout(() => {
    if (!gameState.active) return;
    gameState.locked = false;
    displayWord();
    runWordTimer();
  }, 550);
}

function flash(color, msg) {
  const f = document.getElementById('gflash');
  const t = document.getElementById('gfeedback');
  f.className = 'game-flash ' + color + ' on';
  t.className = 'game-feedback-text ' + color + ' on';
  t.textContent = msg;
  setTimeout(() => {
    f.className = 'game-flash';
    t.className = 'game-feedback-text';
  }, 480);
}

// ════════════════════════════════════════
// DEVICE MOTION (tilt detection)
// ════════════════════════════════════════
function requestOrientationPermission() {
  if (typeof DeviceMotionEvent !== 'undefined' &&
      typeof DeviceMotionEvent.requestPermission === 'function') {
    DeviceMotionEvent.requestPermission()
      .then(r => {
        if (r === 'granted') {
          bindMotion();
        } else {
          alert('Motion permission denied. Go to Settings → Safari → Motion & Orientation Access and enable it, then reload.');
        }
      })
      .catch(() => {});
  } else if (typeof DeviceMotionEvent !== 'undefined') {
    bindMotion();
  }
}

function bindMotion() {
  if (gameState.orientationBound) return;
  window.addEventListener('devicemotion', onMotion);
  gameState.orientationBound = true;
}

function onMotion(e) {
  if (!gameState.active || gameState.locked) return;
  const g = e.accelerationIncludingGravity;
  if (!g) return;

  // Auto-detect iOS vs spec sign convention from the z axis.
  // Face-up: spec/Android → z ≈ -9.8, iOS → z ≈ +9.8.
  // We need y-negative when portrait-top tilts toward floor.
  // On iOS that requires negating y, on Android we keep it as-is.
  if (motionSign === null && g.z != null && Math.abs(g.z) > 4) {
    motionSign = g.z < 0 ? 1 : -1;
  }
  const sign = motionSign !== null ? motionSign : 1;
  const raw = (g.y || 0) * sign;

  tiltRawBuf.push(raw);
  if (tiltRawBuf.length > 20) tiltRawBuf.shift();

  // ── Phase 1: Initial arm ──────────────────────────────────────────
  if (!tiltArmed) {
    if (Date.now() - tiltStartTime >= TILT_ARM_DELAY && getStableBaseline()) {
      tiltArmed = true;
    }
    return;
  }

  // ── Phase 2: Debounce / cooldown ─────────────────────────────────
  if (tiltInCooldown) {
    if (Date.now() >= tiltCooldownEnd && getStableBaseline()) {
      tiltInCooldown = false;
      tiltStreakDir  = 0;
      tiltStreakCnt  = 0;
    }
    return;
  }

  // ── Phase 3: Low-pass filter ──────────────────────────────────────
  const slice    = tiltRawBuf.slice(-TILT_SMOOTH_N);
  const smoothed = slice.reduce((a, b) => a + b, 0) / slice.length;

  // ── Phase 4: Threshold + streak ───────────────────────────────────
  const delta = smoothed - tiltBaseline;

  if (delta < -TILT_CORRECT_G) {
    // Portrait-top toward floor → Got It
    if (tiltStreakDir !== -1) { tiltStreakDir = -1; tiltStreakCnt = 0; }
    if (++tiltStreakCnt >= TILT_STREAK) doCorrect();

  } else if (delta > TILT_SKIP_G) {
    // Portrait-top toward ceiling → Skip
    if (tiltStreakDir !== 1) { tiltStreakDir = 1; tiltStreakCnt = 0; }
    if (++tiltStreakCnt >= TILT_STREAK) doPass();

  } else {
    tiltStreakDir = 0;
    tiltStreakCnt = 0;
  }
}

// ════════════════════════════════════════
// WAKE LOCK
// ════════════════════════════════════════
async function acquireWakeLock() {
  try {
    if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen');
  } catch(e) {}
}
function releaseWakeLock() {
  if (wakeLock) { wakeLock.release().catch(()=>{}); wakeLock = null; }
}

// ════════════════════════════════════════
// RESULTS
// ════════════════════════════════════════
function showResultsScreen() {
  const { correct, missed } = gameState;
  document.getElementById('res-score').textContent =
    `${correct.length} point${correct.length !== 1 ? 's' : ''}!`;

  document.getElementById('res-correct').innerHTML = correct.length
    ? correct.map(w => `<span class="chip blue">${esc(w)}</span>`).join('')
    : '<span style="color:#4b5563;font-size:14px;">None this round</span>';

  document.getElementById('res-missed').innerHTML = missed.length
    ? missed.map(w => `<span class="chip red">${esc(w)}</span>`).join('')
    : '<span style="color:#4b5563;font-size:14px;">None — perfect round!</span>';

  nav('results');
}

// ════════════════════════════════════════
// MODAL
// ════════════════════════════════════════
function showModal(html) {
  document.getElementById('modal-box').innerHTML = html;
  document.getElementById('modal-wrap').style.display = 'block';
  document.getElementById('modal-wrap').onkeydown = e => {
    if (e.key === 'Enter') document.querySelector('.btn-mconfirm')?.click();
    if (e.key === 'Escape') closeModal();
  };
}
function closeModal() {
  document.getElementById('modal-wrap').style.display = 'none';
}
function modalBgClick(e) {
  if (e.target === document.getElementById('modal-wrap')) closeModal();
}
function focusInput() {
  setTimeout(() => document.getElementById('mi')?.focus(), 80);
}

// ════════════════════════════════════════
// UTIL
// ════════════════════════════════════════
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function addConfettiPiece(particles, canvas) {
  const colors = ['#ff4444','#ff8800','#ffdd00','#44cc44','#4499ff','#aa44ff','#ff44aa','#44ffee'];
  particles.push({
    x: Math.random() * canvas.width, y: -15,
    vx: (Math.random() - 0.5) * 4,
    vy: Math.random() * 3 + 2,
    rot: Math.random() * Math.PI * 2,
    rotV: (Math.random() - 0.5) * 0.15,
    color: colors[Math.floor(Math.random() * colors.length)],
    w: Math.random() * 12 + 6, h: Math.random() * 7 + 4,
    dead: false,
    update() { this.x += this.vx; this.y += this.vy; this.rot += this.rotV;
                if (this.y > canvas.height + 20) this.dead = true; },
    draw(ctx) { ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rot);
                ctx.globalAlpha = 1; ctx.fillStyle = this.color;
                ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h); ctx.restore(); }
  });
}

function launchFirework(particles, canvas) {
  const cx = canvas.width  * (0.15 + Math.random() * 0.7);
  const cy = canvas.height * (0.1  + Math.random() * 0.45);
  const hue = Math.floor(Math.random() * 360);
  const count = 55 + Math.floor(Math.random() * 25);
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;
    const speed = Math.random() * 5 + 2;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      opacity: 1,
      hue: hue + Math.floor(Math.random() * 50 - 25),
      size: Math.random() * 3 + 1,
      dead: false,
      update() { this.x += this.vx; this.y += this.vy;
                 this.vy += 0.08; this.vx *= 0.96; this.vy *= 0.96;
                 this.opacity -= 0.018; if (this.opacity <= 0) this.dead = true; },
      draw(ctx) { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                  ctx.fillStyle = `hsl(${this.hue},100%,60%)`; ctx.globalAlpha = this.opacity;
                  ctx.fill(); }
    });
  }
}

function runSplashPhase(imgSrc, message, duration, withFireworks, onDone) {
  const photo    = document.getElementById('splash-photo');
  const msgEl    = document.getElementById('splash-msg');
  const tapEl    = document.getElementById('splash-tap');
  const textWrap = document.getElementById('splash-text-wrap');
  const canvas   = document.getElementById('splash-canvas');
  const ctx      = canvas.getContext('2d');

  // Reset state
  photo.style.transition = 'none';
  photo.style.opacity = '0';
  photo.src = imgSrc;
  msgEl.textContent = message;
  textWrap.classList.remove('visible');
  tapEl.classList.remove('visible');
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const particles = [];
  let animFrame;
  let confettiStart = null;
  let stopped = false;

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  // Photo fade in
  setTimeout(() => {
    photo.style.transition = 'opacity 0.9s ease';
    photo.style.opacity = '1';
  }, 80);

  // Text pop in
  setTimeout(() => { textWrap.classList.add('visible'); }, 1200);

  // Tap hint
  setTimeout(() => { tapEl.classList.add('visible'); }, duration - 1500);

  // Confetti & fireworks
  setTimeout(() => {
    confettiStart = Date.now();
    if (withFireworks) {
      const fwTimes = [0, 600, 1200, 2000, 2800, 3600, 4400];
      fwTimes.forEach(t => setTimeout(() => { if (!stopped) launchFirework(particles, canvas); }, t));
    }
  }, 1500);

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (confettiStart && Date.now() - confettiStart < duration - 1800 && Math.random() < 0.45)
      addConfettiPiece(particles, canvas);
    for (let i = particles.length - 1; i >= 0; i--) {
      particles[i].update(); particles[i].draw(ctx);
      if (particles[i].dead) particles.splice(i, 1);
    }
    ctx.globalAlpha = 1;
    animFrame = requestAnimationFrame(animate);
  }
  animFrame = requestAnimationFrame(animate);

  function finish() {
    if (stopped) return;
    stopped = true;
    window.removeEventListener('resize', resize);
    cancelAnimationFrame(animFrame);
    const splash = document.getElementById('screen-splash');
    splash.style.transition = 'opacity 0.7s ease';
    splash.style.opacity = '0';
    setTimeout(() => { splash.style.transition = ''; splash.style.opacity = '1'; onDone(); }, 700);
  }

  // Auto-advance
  const timer = setTimeout(finish, duration);

  // Tap to skip
  document.getElementById('screen-splash').addEventListener('click', function handler() {
    clearTimeout(timer);
    document.getElementById('screen-splash').removeEventListener('click', handler);
    finish();
  }, { once: true });
}

function showSplash() {
  nav('splash');
  // Phase 1: Dina birthday photo
  runSplashPhase(SPLASH_IMG_DINA, "Happy 40th Birthday Dina! 🎉", 7000, true, () => {
    // Phase 2: Party photo
    nav('splash');
    document.getElementById('screen-splash').style.opacity = '1';
    runSplashPhase(SPLASH_IMG_PARTY, "Let's play charades! 🎭", 5000, false, () => {
      nav('home');
    });
  });
}

try { loadData(); } catch(e) {
  categories = DEFAULTS.map(d => ({ ...d, words: [...d.words] }));
}
renderHome();
showSplash();
</script>
